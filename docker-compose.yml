services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3010
      SQLITE_DB_PATH: /app/data/lektor.sqlite
    ports:
      - "${APP_PORT:-3010}:3010"
    volumes:
      - type: bind
        source: ./data
        target: /app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3010/api/app-state').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    init: true
    depends_on:
      app:
        condition: service_healthy
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Defina NGROK_AUTHTOKEN no arquivo .env}
    command:
      - "http"
      - "http://app:3010"
      - "--log"
      - "stdout"
    ports:
      - "4040:4040"
